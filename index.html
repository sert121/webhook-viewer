<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #111;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    header { margin-bottom: 32px; }
    header h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    header p { font-size: 13px; color: #888; }

    .connect-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .connect-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .connect-bar input:focus { border-color: #999; }
    .connect-bar button {
      padding: 8px 16px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .connect-bar button:hover { background: #333; }

    #status {
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
    }
    #status .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot.live { background: #22c55e; }
    .dot.off { background: #ccc; }
    .dot.err { background: #ef4444; }

    .results-list { list-style: none; }
    .results-list li {
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .results-list li:last-child { border-bottom: none; }
    .result-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .result-title a { color: #111; text-decoration: none; }
    .result-title a:hover { text-decoration: underline; }
    .result-meta {
      font-size: 12px; color: #888;
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .result-meta a { color: #888; text-decoration: none; }
    .result-meta a:hover { color: #111; }
    .result-monitor {
      font-size: 11px; color: #666;
      background: #f5f5f5;
      padding: 1px 6px; border-radius: 3px;
    }
    .empty {
      text-align: center; color: #ccc;
      font-size: 14px; padding: 60px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Monitor Viewer</h1>
    <p>Paste your webhook.site URL to watch monitoring results live.</p>
  </header>

  <div class="connect-bar">
    <input type="text" id="token-input" placeholder="https://webhook.site/your-id-here" />
    <button id="connect-btn" onclick="toggle()">Connect</button>
  </div>

  <div id="status"><span class="dot off"></span>Not connected</div>

  <ul class="results-list" id="results"></ul>
  <div class="empty" id="empty">No results yet</div>

  <script>
    const PROXY = "https://api.allorigins.win/raw?url=";
    let polling = null;
    let currentToken = null;

    function extractToken(input) {
      input = input.trim();
      const match = input.match(/webhook\.site\/(?:token\/)?([0-9a-f-]{36})/i);
      if (match) return match[1];
      if (/^[0-9a-f-]{36}$/i.test(input)) return input;
      return null;
    }

    function toggle() {
      polling ? stop() : start();
    }

    function start() {
      const token = extractToken(document.getElementById("token-input").value);
      if (!token) { alert("Paste a webhook.site URL or token."); return; }

      currentToken = token;
      history.replaceState(null, "", "?token=" + token);
      document.getElementById("connect-btn").textContent = "Disconnect";
      setStatus("live", "Connecting...");
      fetchResults();
      polling = setInterval(fetchResults, 5000);
    }

    function stop() {
      clearInterval(polling);
      polling = null;
      currentToken = null;
      document.getElementById("connect-btn").textContent = "Connect";
      setStatus("off", "Disconnected");
    }

    function setStatus(state, text) {
      document.getElementById("status").innerHTML =
        '<span class="dot ' + state + '"></span>' + text;
    }

    async function fetchResults() {
      if (!currentToken) return;
      const target = encodeURIComponent(
        "https://webhook.site/token/" + currentToken + "/requests?sorting=newest&per_page=50"
      );
      try {
        const resp = await fetch(PROXY + target);
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();

        const items = [];
        for (const req of data.data || []) {
          try {
            const record = JSON.parse(req.content);
            if (record._event) continue;
            if (!record.id && !record.title) continue;
            items.push(record);
          } catch {}
        }

        setStatus("live", "Live — " + items.length + " results");
        render(items);
      } catch (e) {
        setStatus("err", "Error: " + e.message);
      }
    }

    function render(items) {
      const list = document.getElementById("results");
      const empty = document.getElementById("empty");

      if (!items.length) {
        list.innerHTML = "";
        empty.style.display = "block";
        empty.textContent = "Waiting for results...";
        return;
      }

      empty.style.display = "none";
      list.innerHTML = "";

      for (const r of items) {
        const li = document.createElement("li");
        const time = r.created_at ? new Date(r.created_at).toLocaleString() : "";
        li.innerHTML =
          '<div class="result-title"><a href="' + esc(r.url) + '" target="_blank">' +
            esc(r.title || "(no title)") + '</a></div>' +
          '<div class="result-meta">' +
            '<span>' + (r.points || 0) + ' pts</span>' +
            '<span>' + (r.comments || 0) + ' comments</span>' +
            '<span>by ' + esc(r.author || "?") + '</span>' +
            '<span>' + time + '</span>' +
            '<a href="' + esc(r.hn_url) + '" target="_blank">HN</a>' +
            (r.monitor ? '<span class="result-monitor">' + esc(r.monitor) + '</span>' : '') +
          '</div>';
        list.appendChild(li);
      }
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    // Auto-connect if token in URL
    (function() {
      const token = new URLSearchParams(location.search).get("token");
      if (token) {
        document.getElementById("token-input").value = token;
        start();
      }
    })();
  </script>
</body>
</html>
