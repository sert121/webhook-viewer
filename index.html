<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #111;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    header p {
      font-size: 13px;
      color: #888;
    }

    .load-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .load-bar label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #111;
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .load-bar label:hover { background: #333; }
    .load-bar label input { display: none; }

    .load-bar span.or {
      display: flex;
      align-items: center;
      font-size: 12px;
      color: #aaa;
    }

    .load-bar button {
      padding: 8px 16px;
      background: #fff;
      color: #111;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .load-bar button:hover { border-color: #999; }

    #status {
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
    }

    .results-list {
      list-style: none;
    }

    .results-list li {
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .results-list li:last-child { border-bottom: none; }

    .result-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .result-title a {
      color: #111;
      text-decoration: none;
    }

    .result-title a:hover { text-decoration: underline; }

    .result-meta {
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .result-meta a {
      color: #888;
      text-decoration: none;
    }

    .result-meta a:hover { color: #111; }

    .result-monitor {
      font-size: 11px;
      color: #666;
      background: #f5f5f5;
      padding: 1px 6px;
      border-radius: 3px;
    }

    .empty {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      padding: 60px 0;
    }

    .drop-zone {
      border: 2px dashed #e0e0e0;
      border-radius: 8px;
      padding: 48px 20px;
      text-align: center;
      color: #bbb;
      font-size: 13px;
      margin-bottom: 24px;
      transition: border-color 0.15s, color 0.15s;
    }

    .drop-zone.over {
      border-color: #111;
      color: #111;
    }

    /* paste modal */
    .paste-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }

    .paste-overlay.open { display: flex; }

    .paste-box {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
    }

    .paste-box textarea {
      width: 100%;
      height: 200px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 12px;
      resize: vertical;
      margin-bottom: 12px;
    }

    .paste-box .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .paste-box .actions button {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }

    .paste-box .actions .cancel { background: #f0f0f0; color: #333; }
    .paste-box .actions .load { background: #111; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>Monitor Viewer</h1>
    <p>Load a JSONL file from the monitoring agent to view results.</p>
  </header>

  <div class="load-bar">
    <label>
      Load file
      <input type="file" id="file-input" accept=".jsonl,.json,.txt" onchange="handleFile(this.files[0])" />
    </label>
    <span class="or">or</span>
    <button onclick="openPaste()">Paste JSONL</button>
  </div>

  <div class="drop-zone" id="drop-zone">Drop a .jsonl file here</div>

  <div id="status"></div>
  <ul class="results-list" id="results"></ul>
  <div class="empty" id="empty">No results loaded</div>

  <!-- paste modal -->
  <div class="paste-overlay" id="paste-overlay" onclick="closePaste(event)">
    <div class="paste-box">
      <textarea id="paste-area" placeholder='Paste JSONL lines here, e.g.&#10;{"id":"123","title":"Some Story","url":"https://...","points":42,...}'></textarea>
      <div class="actions">
        <button class="cancel" onclick="closePaste()">Cancel</button>
        <button class="load" onclick="loadPaste()">Load</button>
      </div>
    </div>
  </div>

  <script>
    // --- drag & drop ---
    const dropZone = document.getElementById("drop-zone");

    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("over");
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    // --- file loading ---
    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => loadJsonl(reader.result, file.name);
      reader.readAsText(file);
    }

    // --- paste modal ---
    function openPaste() {
      document.getElementById("paste-overlay").classList.add("open");
      document.getElementById("paste-area").focus();
    }

    function closePaste(e) {
      if (e && e.target !== document.getElementById("paste-overlay")) return;
      document.getElementById("paste-overlay").classList.remove("open");
    }

    function loadPaste() {
      const text = document.getElementById("paste-area").value.trim();
      if (!text) return;
      document.getElementById("paste-overlay").classList.remove("open");
      loadJsonl(text, "pasted");
    }

    // --- parse & render ---
    function loadJsonl(text, source) {
      const lines = text.trim().split("\n");
      const items = [];

      for (const line of lines) {
        try {
          const obj = JSON.parse(line);
          if (obj._event) continue; // skip lifecycle events
          if (!obj.id && !obj.title) continue; // skip non-results
          items.push(obj);
        } catch { /* skip bad lines */ }
      }

      document.getElementById("status").textContent =
        `Loaded ${items.length} results from ${source}`;
      renderResults(items);
    }

    function renderResults(items) {
      const list = document.getElementById("results");
      const empty = document.getElementById("empty");

      if (items.length === 0) {
        list.innerHTML = "";
        empty.style.display = "block";
        empty.textContent = "No results found in file";
        return;
      }

      empty.style.display = "none";
      dropZone.style.display = "none";
      list.innerHTML = "";

      for (const r of items) {
        const li = document.createElement("li");
        const time = r.created_at ? new Date(r.created_at).toLocaleString() : "";
        li.innerHTML = `
          <div class="result-title"><a href="${esc(r.url)}" target="_blank">${esc(r.title || "(no title)")}</a></div>
          <div class="result-meta">
            <span>${r.points || 0} pts</span>
            <span>${r.comments || 0} comments</span>
            <span>by ${esc(r.author || "?")}</span>
            <span>${time}</span>
            <a href="${esc(r.hn_url)}" target="_blank">HN</a>
            ${r.monitor ? `<span class="result-monitor">${esc(r.monitor)}</span>` : ""}
          </div>
        `;
        list.appendChild(li);
      }
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }
  </script>
</body>
</html>
